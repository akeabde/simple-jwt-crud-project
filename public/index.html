<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Tailwind CSS CDN - مكتبة التصميم -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- 
  هذه صفحة تسجيل الدخول / This is the Login page
  المستخدم يدخل الإيميل وكلمة المرور / User enters email and password
-->

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">

  <!-- البطاقة الرئيسية / Main card -->
  <div class="w-full max-w-md">

    <!-- العنوان / Title -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">👋 Welcome</h1>
      <p class="text-blue-300 text-lg">Log in to continue</p>
    </div>

    <!-- فورم تسجيل الدخول / Login form -->
    <form id="loginForm" class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl p-8 space-y-6">

      <!-- رسالة الخطأ (مخفية في البداية) / Error message (hidden at start) -->
      <div id="errorMessage" class="hidden bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-xl text-center text-sm"></div>

      <!-- حقل الإيميل / Email field -->
      <div>
        <label class="block text-blue-200 text-sm font-semibold mb-2">📧 Email</label>
        <input
          type="email"
          id="email"
          placeholder="example@email.com"
          required
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-blue-300/50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
        >
      </div>

      <!-- حقل كلمة المرور / Password field -->
      <div>
        <label class="block text-blue-200 text-sm font-semibold mb-2">🔒 Password</label>
        <input
          type="password"
          id="password"
          placeholder="********"
          required
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-blue-300/50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
        >
      </div>

      <!-- زر تسجيل الدخول / Login button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 transform hover:scale-[1.02] shadow-lg"
      >
        Login
      </button>

      <!-- رابط التسجيل / Register link -->
      <p class="text-center text-blue-300 text-sm">
        Don't have an account?
        <a href="register.html" class="text-blue-400 hover:text-blue-300 font-semibold underline">Register here</a>
      </p>

    </form>
  </div>

  <!-- ===== JavaScript ===== -->
  <script>
    // --- التحقق إذا المستخدم مسجل مسبقاً / Check if user is already logged in ---
    const existingToken = localStorage.getItem('token');
    if (existingToken) {
      // إذا كان أدمن، انتقل لصفحة الأدمن / If admin, go to admin page
      const isAdmin = localStorage.getItem('isAdmin');
      if (isAdmin === 'true') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    // --- الحصول على عناصر الصفحة / Get page elements ---
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    // --- عند إرسال الفورم / When form is submitted ---
    loginForm.addEventListener('submit', async (e) => {
      // منع إعادة تحميل الصفحة / Prevent page reload
      e.preventDefault();

      // إخفاء رسالة الخطأ / Hide error message
      errorMessage.classList.add('hidden');

      // أخذ القيم من الحقول / Get values from fields
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // --- إرسال الطلب للسيرفر / Send request to server ---
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        // تحويل الرد لـ JSON / Convert response to JSON
        const data = await response.json();

        // --- التحقق من نجاح العملية / Check if successful ---
        if (response.ok) {
          // حفظ التوكن في localStorage / Save token in localStorage
          localStorage.setItem('token', data.token);
          // حفظ اسم المستخدم / Save user name
          localStorage.setItem('userName', data.user.name);
          // حفظ حالة الأدمن / Save admin status
          localStorage.setItem('isAdmin', data.user.isAdmin || false);

          // التحويل حسب نوع المستخدم / Redirect based on user type
          if (data.user.isAdmin) {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          // عرض رسالة الخطأ / Show error message
          errorMessage.textContent = data.message;
          errorMessage.classList.remove('hidden');
        }

      } catch (error) {
        // خطأ في الاتصال / Connection error
        errorMessage.textContent = 'Server connection error';
        errorMessage.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
