<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!--
  هذه صفحة الأدمن / This is the Admin page
  تعرض كل المستخدمين وكل الأشخاص الذين أضافوهم
  It shows all users and all persons they created
-->

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-red-950 to-slate-900">

  <!-- ===== شريط التنقل / Navigation Bar ===== -->
  <nav class="bg-white/5 backdrop-blur-lg border-b border-white/10 px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="text-white flex items-center gap-3">
        <span class="bg-red-500/20 text-red-300 px-3 py-1 rounded-lg text-sm font-bold border border-red-500/30">ADMIN</span>
        <span class="font-bold text-lg">Admin Panel</span>
      </div>
      <button
        id="logoutBtn"
        class="bg-red-500/20 hover:bg-red-500/40 text-red-300 hover:text-red-100 px-5 py-2 rounded-xl font-semibold transition-all border border-red-500/30"
      >
        🚪 Logout
      </button>
    </div>
  </nav>

  <!-- ===== المحتوى الرئيسي / Main Content ===== -->
  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- ===== الإحصائيات / Stats ===== -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
      <!-- عدد المستخدمين / Total users -->
      <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center">
        <p class="text-5xl font-bold text-white mb-2" id="totalUsers">0</p>
        <p class="text-blue-300 text-sm font-semibold">👥 Total Users</p>
      </div>
      <!-- عدد الأشخاص / Total persons -->
      <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-6 text-center">
        <p class="text-5xl font-bold text-white mb-2" id="totalPersons">0</p>
        <p class="text-purple-300 text-sm font-semibold">📋 Total Persons</p>
      </div>
    </div>

    <!-- ===== قائمة المستخدمين / Users List ===== -->
    <div class="mb-10">
      <h2 class="text-2xl font-bold text-white mb-4">👥 All Users</h2>
      <div id="usersList" class="grid gap-3"></div>
    </div>

    <!-- ===== قائمة كل الأشخاص / All Persons List ===== -->
    <div>
      <h2 class="text-2xl font-bold text-white mb-4">📋 All Persons (from all users)</h2>
      <div id="emptyMessage" class="hidden text-center py-10">
        <p class="text-4xl mb-2">📭</p>
        <p class="text-purple-300">No persons added yet</p>
      </div>
      <div id="personsList" class="grid gap-3"></div>
    </div>
  </div>

  <!-- ===== JavaScript ===== -->
  <script>
    // ==========================================
    // التحقق من الدخول والصلاحيات / Check login and permissions
    // ==========================================
    const token = localStorage.getItem('token');
    const isAdmin = localStorage.getItem('isAdmin');

    // إذا لا يوجد توكن أو ليس أدمن / If no token or not admin
    if (!token || isAdmin !== 'true') {
      window.location.href = 'index.html';
    }

    // ==========================================
    // العناصر / Elements
    // ==========================================
    const totalUsersEl = document.getElementById('totalUsers');
    const totalPersonsEl = document.getElementById('totalPersons');
    const usersListEl = document.getElementById('usersList');
    const personsListEl = document.getElementById('personsList');
    const emptyMessage = document.getElementById('emptyMessage');

    // ==========================================
    // جلب الإحصائيات / Fetch stats
    // ==========================================
    async function loadStats() {
      try {
        const response = await fetch('/api/admin/stats', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (response.status === 401 || response.status === 403) {
          localStorage.clear();
          window.location.href = 'index.html';
          return;
        }

        const data = await response.json();
        totalUsersEl.textContent = data.totalUsers;
        totalPersonsEl.textContent = data.totalPersons;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    // ==========================================
    // جلب كل المستخدمين / Fetch all users
    // ==========================================
    async function loadUsers() {
      try {
        const response = await fetch('/api/admin/users', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        const users = await response.json();

        usersListEl.innerHTML = users.map(user => `
          <div class="bg-white/5 backdrop-blur border border-white/10 rounded-xl p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
            <div>
              <span class="text-white font-bold">${user.name}</span>
              ${user.isAdmin ? '<span class="ml-2 bg-red-500/20 text-red-300 text-xs px-2 py-0.5 rounded-lg border border-red-500/30">ADMIN</span>' : ''}
            </div>
            <div class="flex items-center gap-4">
              <span class="text-blue-300 text-sm">📧 ${user.email}</span>
              <span class="text-gray-400 text-xs">${new Date(user.createdAt).toLocaleDateString()}</span>
            </div>
          </div>
        `).join('');

      } catch (error) {
        console.error('Error loading users:', error);
      }
    }

    // ==========================================
    // جلب كل الأشخاص / Fetch all persons
    // ==========================================
    async function loadPersons() {
      try {
        const response = await fetch('/api/admin/persons', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        const persons = await response.json();

        if (persons.length === 0) {
          personsListEl.innerHTML = '';
          emptyMessage.classList.remove('hidden');
          return;
        }

        emptyMessage.classList.add('hidden');

        personsListEl.innerHTML = persons.map(person => `
          <div class="bg-white/5 backdrop-blur border border-white/10 rounded-xl p-4">
            <div class="flex flex-col sm:flex-row justify-between gap-3">
              <div class="flex-1">
                <h3 class="text-lg font-bold text-white">${person.ism} ${person.nasab}</h3>
                <p class="text-purple-300 text-sm">🎂 Age: ${person.l3omr}</p>
                ${person.description ? `<p class="text-gray-400 text-sm mt-1">${person.description}</p>` : ''}
              </div>
              <div class="flex items-center">
                <span class="bg-blue-500/10 text-blue-300 text-xs px-3 py-1 rounded-lg border border-blue-500/20">
                  👤 Created by: ${person.user ? person.user.name : 'Unknown'} (${person.user ? person.user.email : ''})
                </span>
              </div>
            </div>
          </div>
        `).join('');

      } catch (error) {
        console.error('Error loading persons:', error);
      }
    }

    // ==========================================
    // تسجيل الخروج / Logout
    // ==========================================
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'index.html';
    });

    // ==========================================
    // تحميل كل البيانات / Load all data
    // ==========================================
    loadStats();
    loadUsers();
    loadPersons();
  </script>

</body>
</html>
