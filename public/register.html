<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <!-- Tailwind CSS CDN - مكتبة التصميم -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- 
  هذه صفحة التسجيل / This is the Register page
  المستخدم يدخل اسمه وإيميله وكلمة المرور / User enters name, email, and password
-->

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 flex items-center justify-center p-4">

  <!-- البطاقة الرئيسية / Main card -->
  <div class="w-full max-w-md">

    <!-- العنوان / Title -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">📝 Create Account</h1>
      <p class="text-emerald-300 text-lg">Register a new account</p>
    </div>

    <!-- فورم التسجيل / Register form -->
    <form id="registerForm" class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl p-8 space-y-5">

      <!-- رسالة الخطأ / Error message -->
      <div id="errorMessage" class="hidden bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 rounded-xl text-center text-sm"></div>

      <!-- رسالة النجاح / Success message -->
      <div id="successMessage" class="hidden bg-emerald-500/20 border border-emerald-500/50 text-emerald-200 px-4 py-3 rounded-xl text-center text-sm"></div>

      <!-- حقل الاسم / Name field -->
      <div>
        <label class="block text-emerald-200 text-sm font-semibold mb-2">👤 Name</label>
        <input
          type="text"
          id="name"
          placeholder="e.g. Ahmed"
          required
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
        >
      </div>

      <!-- حقل الإيميل / Email field -->
      <div>
        <label class="block text-emerald-200 text-sm font-semibold mb-2">📧 Email</label>
        <input
          type="email"
          id="email"
          placeholder="example@email.com"
          required
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
        >
      </div>

      <!-- حقل كلمة المرور / Password field -->
      <div>
        <label class="block text-emerald-200 text-sm font-semibold mb-2">🔒 Password</label>
        <input
          type="password"
          id="password"
          placeholder="********"
          required
          minlength="6"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
        >
        <p class="text-emerald-400/60 text-xs mt-1">At least 6 characters</p>
      </div>

      <!-- زر التسجيل / Register button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 transform hover:scale-[1.02] shadow-lg"
      >
        Register
      </button>

      <!-- رابط تسجيل الدخول / Login link -->
      <p class="text-center text-emerald-300 text-sm">
        Already have an account?
        <a href="index.html" class="text-emerald-400 hover:text-emerald-300 font-semibold underline">Login</a>
      </p>

    </form>
  </div>

  <!-- ===== JavaScript ===== -->
  <script>
    // --- الحصول على عناصر الصفحة / Get page elements ---
    const registerForm = document.getElementById('registerForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    // --- عند إرسال الفورم / When form is submitted ---
    registerForm.addEventListener('submit', async (e) => {
      // منع إعادة تحميل الصفحة / Prevent page reload
      e.preventDefault();

      // إخفاء الرسائل / Hide messages
      errorMessage.classList.add('hidden');
      successMessage.classList.add('hidden');

      // أخذ القيم من الحقول / Get values from fields
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // --- إرسال طلب التسجيل للسيرفر / Send register request to server ---
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        // تحويل الرد لـ JSON / Convert response to JSON
        const data = await response.json();

        if (response.ok) {
          // --- نجاح التسجيل / Registration successful ---
          successMessage.textContent = '✅ Registration successful! Redirecting...';
          successMessage.classList.remove('hidden');

          // الانتظار ثانيتين ثم التحويل لصفحة الدخول
          // Wait 2 seconds then redirect to login page
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);

        } else {
          // عرض رسالة الخطأ / Show error message
          errorMessage.textContent = data.message;
          errorMessage.classList.remove('hidden');
        }

      } catch (error) {
        errorMessage.textContent = 'Server connection error';
        errorMessage.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
